<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema de Prestamos{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --danger: #b91c1c;
            --border: #dbe2ea;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #eef2f7 0%, #f9fbfd 100%);
            color: var(--text);
        }

        .container {
            width: min(980px, 92%);
            margin: 0 auto;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem;
            box-shadow: 0 4px 18px rgba(15, 23, 42, 0.06);
        }

        h1 {
            margin-top: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 0.7rem;
            border-bottom: 1px solid var(--border);
            text-align: left;
            font-size: 0.95rem;
        }

        th {
            background: #f0f6f6;
            font-weight: 600;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            border: 1px solid transparent;
            text-decoration: none;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: #fff;
            border-color: var(--border);
            color: var(--text);
        }

        .btn-danger {
            background: var(--danger);
            color: #fff;
        }

        .form-grid {
            display: grid;
            gap: 0.8rem;
        }

        label {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 0.2rem;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 0.55rem 0.65rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .errors {
            background: #fee2e2;
            color: #7f1d1d;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.7rem;
            margin-bottom: 0.8rem;
        }

        @media (max-width: 720px) {
            th, td {
                font-size: 0.85rem;
                padding: 0.55rem;
            }
        }
    </style>
</head>
<body>
    {% include "components/navbar.html" %}

    <main class="container" style="padding: 1.2rem 0 2rem;">
        {% block content %}{% endblock %}
    </main>

    {% include "components/footer.html" %}
</body>
</html>
